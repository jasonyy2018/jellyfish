name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run prisma:generate
        env:
          DATABASE_URL: postgresql://jellyfish:jellyfish@localhost:5432/jellyfish
      - run: npm run build
      - run: npm run test
