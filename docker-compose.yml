services:
  dashboard:
    build: .
    env_file:
      - .env.production
    ports:
      - "3000:3000"
    command: npm run start:dashboard
    depends_on:
      - api
      - db
      - redis

  web:
    build: .
    env_file:
      - .env.production
    ports:
      - "3001:3001"
    command: npm run start:web
    depends_on:
      - dashboard

  api:
    build: .
    env_file:
      - .env.production
    ports:
      - "3002:3002"
    command: npm run start:api
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - jellyfish-pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  jellyfish-pg:
